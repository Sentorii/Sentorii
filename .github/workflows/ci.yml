name: Rust CI & Release
on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, develop]

jobs:
  check-and-test:
    name: Test on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Formatting
        run: cargo fmt --all --check

      - name: Run Clippy Linter
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Tests
        run: cargo test --workspace --all-targets --features test-integration

  create-release:
    name: Create Release
    needs: check-and-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross-compilation tool
        uses: taiki-e/install-action@cross

      - name: Get version from tag
        id: get_version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build release binaries
        run: |
          cross build --workspace --release --target x86_64-unknown-linux-gnu
          cross build --workspace --release --target x86_64-apple-darwin
          cross build --workspace --release --target x86_64-pc-windows-msvc

      - name: Package artifacts
        run: |
          mkdir artifacts
          
          tar -czvf artifacts/flo-v${{ env.RELEASE_VERSION }}-x86_64-unknown-linux-gnu.tar.gz -C target/x86_64-unknown-linux-gnu/release flo
          tar -czvf artifacts/flo-v${{ env.RELEASE_VERSION }}-x86_64-apple-darwin.tar.gz -C target/x86_64-apple-darwin/release flo
          zip artifacts/flo-v${{ env.RELEASE_VERSION }}-x86_64-pc-windows-msvc/release/flo.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
